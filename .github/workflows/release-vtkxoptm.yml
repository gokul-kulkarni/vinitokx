name: Release vtkxoptm

on:
  push:
    tags:
      - "vtkxoptm-v*"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest   # Apple Silicon (arm64)
            target: aarch64-apple-darwin
          - os: macos-13       # Intel Mac (x86_64)
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            packages/router/target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('packages/router/Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-cargo-

      - name: Build release binary
        run: |
          cd packages/router
          cargo build --release --target ${{ matrix.target }}

      - name: Stage artifact
        run: |
          cp packages/router/target/${{ matrix.target }}/release/vtkxoptm \
             vtkxoptm-${{ matrix.target }}

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: vtkxoptm-${{ matrix.target }}
          generate_release_notes: true
